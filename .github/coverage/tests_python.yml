schema_version: 1
suite: python
reporting:
  label: Python
  artifact_group: python
  artifact_name_template: coverage-{suite}-{profile}-{lane}
  selection_env: PY_TEST_NAMES
  stats_file: python-coverage-stats.env
  duration_file: python-test-durations.csv
  coverage_file: python-coverage.xml
  extra_files:
    - coverage.info
  debug_dirs:
    - src: .tmp/cpp-coverage-parts
      dest: native-cpp-debug
  uploads:
    - name_template: Python API, CPU
      artifact_pattern: coverage-python-cpu-*
      file: python-coverage.xml
      flag: genai-python-cpu
    - name_template: C++ runtime, Python suite, CPU
      artifact_pattern: coverage-python-cpu-*
      file: coverage.info
      flag: genai-native-python-cpu
tests:
  - name: whisper
    kind: command
    profiles: [cpu]
    command: >-
      python3 -m pytest -ra --durations=50 ${PYTEST_COVERAGE_ARGS} -v
      ./tests/python_tests/test_whisper_pipeline.py
      ./tests/python_tests/test_whisper_pipeline_static.py
      -m "not transformers_lower_v5"
      -k "not test_smoke[sample_from_dataset0 and not test_whisper_constructors[sample_from_dataset0 and not test_max_new_tokens[sample_from_dataset0 and not test_language_mode[language and not test_task_mode[sample_from_dataset0 and not test_language_autodetect[sample_from_dataset0 and not test_whisper_config_constructor and not test_language_autodetect[sample_from_dataset1 and not test_language_autodetect[sample_from_dataset2 and not test_initial_prompt_hotwords[sample_from_dataset0 and not test_random_sampling[sample_from_dataset0"

  - name: whisper_transformers_under_5
    kind: command
    profiles: [cpu]
    command: |
      set -e
      python3 -m pip install transformers==4.57.6
      python3 -m pytest -ra --durations=50 ${PYTEST_COVERAGE_ARGS} -v ./tests/python_tests/test_whisper_pipeline.py ./tests/python_tests/test_whisper_pipeline_static.py -m "transformers_lower_v5"

  - name: cacheopt_e2e_part_1
