schema_version: 1
suite: cpp
reporting:
  label: C++
  artifact_group: cpp
  artifact_name_template: coverage-{suite}-{lane}
  selection_env: CXX_TEST_NAMES
  stats_file: cpp-coverage-stats.env
  duration_file: cpp-test-durations.csv
  coverage_file: coverage.info
  debug_dirs:
    - src: .tmp/cpp-coverage-parts
      dest: native-cpp-debug
  uploads:
    - name_template: C++ runtime, C++ suite, {lane}
      file: coverage.info
      flag_template: genai-cpp-{lane}
tests:
  - name: tests_continuous_batching
    binary: tests_continuous_batching
    mode: gtest_single
    profiles: [cpu]
    args: "-AddSecondInputTest.*"
    extra_env: "TEST_MODELS_BASE_DIR=${HF_HOME}/ov_test_models CACHE_TYPES_CSV=${BIN_DIR}/data/cache_types_models.csv"

  - name: cdpruner_dpp_opencl
    binary: tests_continuous_batching
    mode: gtest_single
    profiles: [gpu]
    args: "*OpenCL*"
