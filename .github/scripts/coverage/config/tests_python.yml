  - name: xgrammar_off
    kind: command
    profiles: [cpu]
    command: >-
      PYTHONPATH="${XGRAMMAR_BUILD_DIR}:${PYTHONPATH:-}"
      python3 -m pytest -ra --durations=50 ${PYTEST_COVERAGE_ARGS} -v
      ./tests/python_tests/test_llm_pipeline.py
      -k "not test_perf_metrics_with_structured_output"
