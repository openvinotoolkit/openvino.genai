  - name: continuous_batching_tools
    kind: command
    profiles: [cpu]
    env: "SAMPLES_CPP_DIR=${INSTALL_PKG_DIR}/samples_bin"
    command: >-
      python3 -m pytest -ra --durations=50 ${PYTEST_COVERAGE_ARGS} -vs
