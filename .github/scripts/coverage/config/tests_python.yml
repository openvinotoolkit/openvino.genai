  - name: samples_speech_generation
    kind: command
    profiles: [cpu]
    env: "SAMPLES_PY_DIR=${INSTALL_PKG_DIR}/samples/python SAMPLES_CPP_DIR=${INSTALL_PKG_DIR}/samples_bin SAMPLES_C_DIR=${INSTALL_PKG_DIR}/samples_bin SAMPLES_JS_DIR=${OV_WORKSPACE}/samples/js"
    command: >-
