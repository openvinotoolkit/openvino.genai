#
# Download OpenVINO developer package from openvino.mx build artifacts.
# Replaces the AKS-dependent openvino_provider action.

name: 'Download OV Package (cross-repo)'
description: 'Download OV developer package from openvino.mx Build OV Packages workflow'

inputs:
  ov_repo:
    description: 'Repository to download OV artifacts from'
    required: false
    default: 'openvinotoolkit/openvino.mx'
  workflow_name:
    description: 'Workflow filename in the source repo'
    required: false
    default: 'build_packages.yml'
  branch:
    description: 'Branch to find successful runs on'
    required: false
    default: 'master'
  artifact_name:
    description: 'OV artifact name to download'
    required: false
    default: 'ov_package_ubuntu22'
  developer_package_artifact:
    description: 'Developer package artifact name'
    required: false
    default: 'ov_developer_package_ubuntu22'
  install_dir:
    description: 'Directory to extract OV package into'
    required: false
    default: './ov'
  token:
    description: 'GitHub token with actions:read permission on ov_repo'
    required: true

outputs:
  ov_artifact_name:
    description: 'Name of the uploaded OV artifact (for downstream compatibility)'
    value: ${{ steps.download.outputs.artifact_name }}
  ov_version:
    description: 'OV version from manifest'
    value: ${{ steps.download.outputs.ov_version }}
  ov_wheel_source:
    description: 'Wheel source flag for pip'
    value: ${{ steps.download.outputs.ov_wheel_source }}

runs:
  using: "composite"
  steps:
    - name: Find latest successful build run
      id: find-run
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        OV_REPO: ${{ inputs.ov_repo }}
        WORKFLOW: ${{ inputs.workflow_name }}
        BRANCH: ${{ inputs.branch }}
      run: |
        echo "Finding latest successful run of $WORKFLOW on $BRANCH in $OV_REPO..."
        RESPONSE=$(curl -sf \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$OV_REPO/actions/workflows/$WORKFLOW/runs?branch=$BRANCH&status=success&per_page=1")

        RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; runs=json.load(sys.stdin)['workflow_runs']; print(runs[0]['id'] if runs else '')")

        if [[ -z "$RUN_ID" ]]; then
          echo "::error::No successful runs found for $WORKFLOW on branch $BRANCH in $OV_REPO"
          exit 1
        fi

        echo "Found run ID: $RUN_ID"
        echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

    - name: Download OV package artifact
      id: download
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        OV_REPO: ${{ inputs.ov_repo }}
        RUN_ID: ${{ steps.find-run.outputs.run_id }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        DEV_PKG_ARTIFACT: ${{ inputs.developer_package_artifact }}
        INSTALL_DIR: ${{ inputs.install_dir }}
      run: |
        set -e
        mkdir -p "$INSTALL_DIR"

        # List artifacts for this run
        ARTIFACTS=$(curl -sf \
          -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/$OV_REPO/actions/runs/$RUN_ID/artifacts")

        # Download main OV package
        OV_PKG_URL=$(echo "$ARTIFACTS" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for a in data['artifacts']:
            if a['name'] == '$ARTIFACT_NAME':
                print(a['archive_download_url'])
                break
        ")

        if [[ -z "$OV_PKG_URL" ]]; then
          echo "::error::Artifact '$ARTIFACT_NAME' not found in run $RUN_ID"
          exit 1
        fi

        echo "Downloading $ARTIFACT_NAME..."
        curl -sfL -H "Authorization: token $GH_TOKEN" -o /tmp/ov_package.zip "$OV_PKG_URL"
        cd "$INSTALL_DIR"
        unzip -q /tmp/ov_package.zip
        # The zip contains a tar.gz, extract it
        if [[ -f ov_package.tar.gz ]]; then
          tar xzf ov_package.tar.gz
          rm -f ov_package.tar.gz
        fi

        # Download developer package
        DEV_PKG_URL=$(echo "$ARTIFACTS" | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        for a in data['artifacts']:
            if a['name'] == '$DEV_PKG_ARTIFACT':
                print(a['archive_download_url'])
                break
        ")

        if [[ -n "$DEV_PKG_URL" ]]; then
          echo "Downloading $DEV_PKG_ARTIFACT..."
          curl -sfL -H "Authorization: token $GH_TOKEN" -o /tmp/dev_package.zip "$DEV_PKG_URL"
          mkdir -p developer_package
          cd developer_package
          unzip -q /tmp/dev_package.zip
          if [[ -f developer_package.tar.gz ]]; then
            tar xzf developer_package.tar.gz
            rm -f developer_package.tar.gz
          fi
          cd ..
        fi

        echo "OV install directory contents:"
        ls -la "$INSTALL_DIR"
        ls -la "$INSTALL_DIR/developer_package" 2>/dev/null || true

        # Output for compatibility with downstream jobs
        echo "artifact_name=ov_package_cross_repo" >> "$GITHUB_OUTPUT"
        echo "ov_version=cross-repo-build" >> "$GITHUB_OUTPUT"
        echo "ov_wheel_source=" >> "$GITHUB_OUTPUT"

    - name: Re-upload as workflow artifact (for downstream jobs)
      uses: actions/upload-artifact@v4
      with:
        name: ov_package_cross_repo
        path: ${{ inputs.install_dir }}
        retention-days: 1
