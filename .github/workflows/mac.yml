name: macOS (13, Python 3.10)
on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - master
      - 'releases/**'

permissions: read-all # Required by https://github.com/ossf/scorecard/blob/e23b8ad91fd6a64a0a971ca4fc0a4d1650725615/docs/checks.md#token-permissions

concurrency:
  # github.ref is not unique in post-commit
  group: ${{ github.event_name == 'push' && github.run_id || github.ref }}-mac
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'
  OV_BRANCH: master
  OV_TARBALL: ''

jobs:
  openvino_download:
    name: Download OpenVINO package
    outputs:
      status: ${{ steps.openvino_download.outcome }}
      ov_artifact_name: ${{ steps.openvino_download.outputs.ov_artifact_name }}
      ov_wheel_source: ${{ steps.openvino_download.outputs.ov_wheel_source }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    runs-on: aks-linux-2-cores-8gb
    container:
      image: 'openvinogithubactions.azurecr.io/openvino_provider:0.1.0'
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
    continue-on-error: true

    steps:
      - id: openvino_download
        uses: openvinotoolkit/openvino/.github/actions/openvino_provider@master
        with:
          platform: macos
          commit_packages_to_provide: all
          revision: latest_available_commit

  genai_python_lib:
    name: OpenVINO genai extension (cmake + wheel)
    needs: [ openvino_download ]
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    runs-on: macos-13

    env:
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      MACOSX_DEPLOYMENT_TARGET: '11.0'

    steps:
      - name: Clone openvino.genai
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download OpenVINO package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Install build dependencies
        run: brew install coreutils ninja scons

      - name: Build genai
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          cmake -DCMAKE_BUILD_TYPE=Release -S ./ -B ./build/
          cmake --build ./build/ --config Release --parallel --verbose

      - name: Test bindings
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          python -m pip install ./thirdparty/openvino_tokenizers/[transformers] -r ./tests/python_tests/requirements.txt --find-links ${OV_INSTALL_DIR}/wheels
          python -m pytest -v ./tests/python_tests/test_tokenizer.py::test_set_chat_template
        env:
          PYTHONPATH: "./build/:$PYTHONPATH"

      - name: Test bindings (wheel)
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          python -m pip install . --verbose --find-links ${OV_INSTALL_DIR}/wheels
          python -c "from openvino_genai import LLMPipeline"
          python -m pip install ./tools/who_what_benchmark --find-links ${OV_INSTALL_DIR}/wheels
          python -m pytest -v ./tests/python_tests/ --ignore ./tests/python_tests/test_whisper_pipeline.py --ignore ./tests/python_tests/test_whisper_pipeline_static.py --ignore ./tests/python_tests/test_vlm_pipeline.py -k "not test_set_chat_template"

  genai_python_lib_whisper:
    name: OpenVINO genai extension whisper tests (cmake + wheel)
    needs: [ openvino_download ]
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    runs-on: macos-13

    env:
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      MACOSX_DEPLOYMENT_TARGET: '11.0'

    steps:
      - name: Clone openvino.genai
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download OpenVINO package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Install build dependencies
        run: brew install coreutils ninja scons

      - name: Build genai
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          cmake -DCMAKE_BUILD_TYPE=Release -S ./ -B ./build/
          cmake --build ./build/ --config Release --target py_openvino_genai --parallel --verbose

      - name: Test bindings
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          python -m pip install ./thirdparty/openvino_tokenizers/[transformers] -r ./tests/python_tests/requirements.txt --find-links ${OV_INSTALL_DIR}/wheels
          python -m pytest -v ./tests/python_tests/test_whisper_pipeline.py -k test_smoke
        env:
          PYTHONPATH: "./build/:$PYTHONPATH"

      - name: Test bindings (wheel)
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          python -m pip install . --verbose --find-links ${OV_INSTALL_DIR}/wheels
          python -c "from openvino_genai import LLMPipeline"
          python -m pip install ./tools/who_what_benchmark --find-links ${OV_INSTALL_DIR}/wheels
          python -m pytest -v ./tests/python_tests/test_whisper_pipeline.py -k "not test_smoke"

  genai_package:
    name: OpenVINO genai extension (install to OpenVINO package)
    strategy:
      matrix:
        build-type: [Release, Debug]
    needs: [ openvino_download ]
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    runs-on: macos-13
    env:
      OV_INSTALL_DIR: ${{ github.workspace }}/ov

    steps:
      - name: Clone openvino.genai
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download OpenVINO package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Install build dependencies
        run: brew install coreutils scons

      - name: Build genai
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -S ./ -B ./build/
          cmake --build ./build/ --config ${{ matrix.build-type }} --target package --parallel --verbose

      - name: Build and Install dependencies
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          python -m pip install ./thirdparty/openvino_tokenizers/[transformers] --find-links ${OV_INSTALL_DIR}/wheels
          python -m pip install -r ./samples/requirements.txt --find-links ${OV_INSTALL_DIR}/wheels
          optimum-cli export openvino --trust-remote-code --model TinyLlama/TinyLlama-1.1B-Chat-v1.0 TinyLlama-1.1B-Chat-v1.0
          optimum-cli export openvino --trust-remote-code --model openai/whisper-tiny whisper-tiny

      - name: Install samples
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          cmake --install ./build/ --config ${{ matrix.build-type }} --prefix ${OV_INSTALL_DIR}

      - name: Build samples (Release)
        if: ${{ 'Release' == matrix.build-type }} # build_samples enforces Release build
        run: |
          ${OV_INSTALL_DIR}/samples/cpp/build_samples.sh -i ${{ github.workspace }}/s\ pace

      - name: Build samples (Debug)
        if: ${{ 'Release' != matrix.build-type }}
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -S ${OV_INSTALL_DIR}/samples/cpp/ -B ./samples\ build/
          cmake --build ./samples\ build/ --config ${{ matrix.build-type }} -j
          cmake --install ./samples\ build/ --config ${{ matrix.build-type }} --component samples_bin --prefix s\ pace

      - name: Test C++ samples (greedy_causal_lm)
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          ${{ github.workspace }}/s\ pace/samples_bin/greedy_causal_lm ./TinyLlama-1.1B-Chat-v1.0/ ""
        timeout-minutes: 1

      - name: Test C++ samples (whisper_speech_recognition)
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          wget https://storage.openvinotoolkit.org/models_contrib/speech/2021.2/librispeech_s5/how_are_you_doing_today.wav
          ${{ github.workspace }}/s\ pace/samples_bin/whisper_speech_recognition ./whisper-tiny/ how_are_you_doing_today.wav
        timeout-minutes: 1

      - name: Test python samples (multinomial_causal_lm)
        if: ${{ 'Release' == matrix.build-type }} # Python bindings can be built in Release only
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          ${OV_INSTALL_DIR}/samples/python/text_generation/multinomial_causal_lm.py ./TinyLlama-1.1B-Chat-v1.0/ 0
        timeout-minutes: 1

      - name: Test python samples (whisper_speech_recognition)
        if: ${{ 'Release' == matrix.build-type }} # Python bindings can be built in Release only
        run: |
          source ${OV_INSTALL_DIR}/setupvars.sh
          ${OV_INSTALL_DIR}/samples/python/whisper_speech_recognition/whisper_speech_recognition.py ./whisper-tiny/ how_are_you_doing_today.wav
        timeout-minutes: 1

  genai_build_nodejs_bindings:
    name: Build Node.js bindings
    strategy:
      fail-fast: false
      matrix:
        build-type: [Release]
    needs: [ openvino_download ]
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    runs-on: 'macos-13'
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.15'
      CMAKE_GENERATOR: 'Ninja Multi-Config'
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      BUILD_DIR: ${{ github.workspace }}/build
      SRC_DIR: ${{ github.workspace }}/src
      NODE_VERSION: 21

    steps:
      - name: Clone openvino.genai
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Install build dependencies
        run: brew install coreutils scons
      
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build GenAI Node.js bindings
        run: |
          source ${{ env.OV_INSTALL_DIR }}/setupvars.sh
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DENABLE_JS=ON -DCPACK_GENERATOR=NPM \
            -DENABLE_PYTHON=OFF -DENABLE_WHEEL=OFF \
            -S ${{ env.SRC_DIR }} -B ${{ env.BUILD_DIR }}
          cmake --build ${{ env.BUILD_DIR }} --config ${{ matrix.build-type }} --parallel $(nproc) --verbose
          cmake --install ${{ env.BUILD_DIR }} --config ${{ matrix.build-type }} --prefix ${{ env.INSTALL_DIR }}
          
      - name: Pack Node.js bindings libs
        run: tar -cvf - * | pigz > ${{ env.BUILD_DIR }}/genai_nodejs_bindings.tar.gz
        working-directory: ${{ env.INSTALL_DIR }}
      
      - name: Upload Archive Package with Node.js bindings
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: genai_nodejs_bindings
          path: ${{ env.BUILD_DIR }}/genai_nodejs_bindings.tar.gz
          if-no-files-found: 'error'

      - name: Install npm package tests dependencies
        working-directory: ${{ env.SRC_DIR }}/src/js
        run: |
          cp -R ${{ env.INSTALL_DIR }} bin
          npm install
          rm -rf node_modules/openvino-node/bin
          cp -R ${{ env.OV_INSTALL_DIR }}/openvino_js_package node_modules/openvino-node/bin

      - name: Run npm package tests
        working-directory: ${{ env.SRC_DIR }}/src/js
        run: npm test

      - name: Install genai-node samples dependencies
        working-directory: ${{ env.SRC_DIR }}/samples/js/text_generation
        run: |
          npm install
          rm -rf node_modules/openvino-node/bin
          cp -R ${{ env.OV_INSTALL_DIR }}/openvino_js_package node_modules/openvino-node/bin

      - name: Run samples tests
        run: npm test
        env:
          MODEL_PATH: ${{ env.SRC_DIR }}/src/js/tests/models/Llama-3.1-8B-Instruct-FastDraft-150M-int8-ov
        working-directory: ${{ env.SRC_DIR }}/samples/js/text_generation

  Overall_Status:
    name: ci/gha_overall_status_macos
    needs: [openvino_download, genai_python_lib, genai_package, genai_python_lib_whisper]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status of all jobs
        if: >-
          ${{
            contains(needs.*.result, 'failure') ||
            contains(needs.*.result, 'cancelled')
          }}
        run: exit 1
