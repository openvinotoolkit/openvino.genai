name: Trigger Documentation Preview Deployment

on:
  pull_request:
    types: [labeled]

permissions: {} # No permissions by default on workflow level

jobs:
  trigger-preview:
    if: github.event.label.name == 'deploy-doc-preview'
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.DOC_HUB_APP_ID }}
          private-key: ${{ secrets.DOC_HUB_APP_PRIVATE_KEY }}

      - name: Send repository dispatch to Doc Central Hub
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # Send authenticated request to Doc Central Hub repository
          # Authentication via GitHub App token (verified by Hub)
          RESPONSE=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            repos/${{ secrets.DOC_HUB_REPO }}/dispatches \
            -f event_type='deploy-preview' \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[pr_number]="${{ github.event.pull_request.number }}" \
            -f client_payload[commit_sha]="${{ github.event.pull_request.head.sha }}" \
            --silent || echo "failed")

          if [ "$RESPONSE" == "failed" ]; then
            echo "Error: Failed to trigger deployment in Doc Central Hub"
            exit 1
          fi

          echo "Preview deployment triggered successfully"
          echo "Commit SHA: ${{ github.event.pull_request.head.sha }}"

      - name: Post confirmation comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Documentation preview deployment triggered for commit \`${{ github.event.pull_request.head.sha }}\`"
