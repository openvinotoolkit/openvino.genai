      BUILD_DIR: ${{ github.workspace }}/build
      BUILD_JS_DIR: ${{ github.workspace }}/build_js
      XGRAMMAR_BUILD_DIR: ${{ github.workspace }}/build_xgrammar
      EXTRA_CPP_COVERAGE_DIRS: ${{ github.workspace }}/build_xgrammar
      EXTENSION_LIB_PATH: ${{ github.workspace }}/install/tests/
      PYTHONPATH: ${{ github.workspace }}/build_xgrammar:${{ github.workspace }}/install/python
      PY_TEST_NAMES: ${{ matrix.test.name }}
      COVERAGE_WRITE_STEP_SUMMARY: 'false'
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download GenAI coverage install
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_INSTALL_ARTIFACT }}
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download Python wheels
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_WHEELS_ARTIFACT_NAME }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download xgrammar-off build package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_XGRAMMAR_ARTIFACT }}
          path: ${{ env.XGRAMMAR_BUILD_DIR }}/openvino_genai
          merge-multiple: true

      - name: Download coverage build notes
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_NOTES_ARTIFACT }}
          path: ${{ github.workspace }}/coverage_notes
          merge-multiple: true

      - name: Restore coverage notes
        run: |
          rm -rf "${BUILD_DIR}" "${BUILD_JS_DIR}"
          mkdir -p "${BUILD_DIR}" "${BUILD_JS_DIR}" "${XGRAMMAR_BUILD_DIR}"
          cp -a coverage_notes/main-build/. "${BUILD_DIR}/"
          if [[ -d coverage_notes/xgrammar-build ]]; then
            cp -a coverage_notes/xgrammar-build/. "${XGRAMMAR_BUILD_DIR}/"
          fi

      - name: Install GenAI Python dependencies
        uses: ./.github/actions/install_wheel
        with:
          packages: "openvino;openvino_tokenizers[transformers]"
          requirements_files: "${{ github.workspace }}/tests/python_tests/requirements.txt"
          local_wheel_dir: ${{ env.OV_INSTALL_DIR }}/wheels

      - name: Install coverage Python dependencies
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: install-requirements

      - name: Export OpenVINO runtime environment
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "PYTHONPATH=${PYTHONPATH:-}"
            echo "OpenVINO_DIR=${OpenVINO_DIR:-}"
            echo "INTEL_OPENVINO_DIR=${INTEL_OPENVINO_DIR:-}"
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Run CPU Python xgrammar-off coverage tests
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: run-suite
          suite: python
          profile: cpu
          lane: ${{ matrix.test.name }}
          test-names: ${{ matrix.test.name }}
          python-package: openvino_genai
          python-source-dir: src/python/openvino_genai
          python-path-alias: openvino_genai
          python-coverage-omit: |
            */tests/*
            */thirdparty/*
            */docs/*
            */samples/*
            */tools/*
            */src/js/tests/*
            *.pb.cc
            *.pb.h

      - name: Generate CPU native C/C++ coverage report
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-native
          profile: cpu
          extra-cpp-coverage-dirs: ${{ env.EXTRA_CPP_COVERAGE_DIRS }}

      - name: Collect Python xgrammar-off CPU results
        id: cpu_artifact
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-results
          suite: python
          profile: cpu
          lane: ${{ matrix.test.name }}
          test-names: ${{ matrix.test.name }}

      - name: Upload Python xgrammar-off CPU artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.cpu_artifact.outputs['artifact-name'] }}
          path: ${{ steps.cpu_artifact.outputs.dir }}
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
          overwrite: true

  CoverageJS:
    name: Coverage Node.js (CPU)
    needs: [openvino_download, genai_build_wheels, genai_build_genai_wheel, CoverageBuild]
    timeout-minutes: 90
    runs-on: aks-linux-4-cores-16gb
    container:
      image: openvinogithubactions.azurecr.io/ov_test/ubuntu_22_04_x64:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: -e HF_TOKEN
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    env:
      TEST_PROFILE: cpu
      OV_WORKSPACE: ${{ github.workspace }}
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      INSTALL_PKG_DIR: ${{ github.workspace }}/install
      BUILD_DIR: ${{ github.workspace }}/build
      BUILD_JS_DIR: ${{ github.workspace }}/build_js
      JS_DIR: ${{ github.workspace }}/src/js
      PYTHONPATH: ${{ github.workspace }}/install/python
      COVERAGE_WRITE_STEP_SUMMARY: 'false'
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download GenAI coverage install
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_INSTALL_ARTIFACT }}
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download Node.js bindings
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_NODEJS_ARTIFACT }}
          path: ${{ env.JS_DIR }}/bin
          merge-multiple: true

      - name: Download Python wheels
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          pattern: "{${{ env.GENAI_WHEELS_ARTIFACT_NAME }},genai_wheel_python_${{ env.PYTHON_VERSION }}}"
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download coverage build notes
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_NOTES_ARTIFACT }}
          path: ${{ github.workspace }}/coverage_notes
          merge-multiple: true

      - name: Restore coverage notes
        run: |
          rm -rf "${BUILD_DIR}" "${BUILD_JS_DIR}"
          mkdir -p "${BUILD_DIR}" "${BUILD_JS_DIR}"
          cp -a coverage_notes/main-build/. "${BUILD_DIR}/"
          if [[ -d coverage_notes/js-build ]]; then
            cp -a coverage_notes/js-build/. "${BUILD_JS_DIR}/"
          fi

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install GenAI Python dependencies
        uses: ./.github/actions/install_wheel
        with:
          packages: "openvino;openvino_tokenizers[transformers];openvino_genai"
          requirements_files: "${{ github.workspace }}/tests/python_tests/requirements.txt"
          local_wheel_dir: ${{ env.OV_INSTALL_DIR }}/wheels

      - name: Install npm package test dependencies
        working-directory: ${{ env.JS_DIR }}
        run: |
          npm install "${OV_INSTALL_DIR}"/openvino_node_npm_package/openvino-node-* --ignore-scripts
          rm -rf node_modules/openvino-node/bin
          ln -sfn "${OV_INSTALL_DIR}/openvino_node_npm_package/bin" node_modules/openvino-node/bin
          npm install --verbose
          npm install --no-save c8

      - name: Install coverage Python dependencies
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: install-requirements

      - name: Export OpenVINO runtime environment
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "PYTHONPATH=${PYTHONPATH:-}"
            echo "OpenVINO_DIR=${OpenVINO_DIR:-}"
            echo "INTEL_OPENVINO_DIR=${INTEL_OPENVINO_DIR:-}"
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Run CPU Node.js coverage tests
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: run-suite
          suite: js
          profile: cpu
          lane: cpu
          js-dir: src/js

      - name: Generate CPU native C/C++ coverage report
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-native
          profile: cpu

      - name: Collect Node.js CPU results
        id: cpu_artifact
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-results
          suite: js
          profile: cpu
          lane: cpu

      - name: Upload Node.js CPU artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.cpu_artifact.outputs['artifact-name'] }}
          path: ${{ steps.cpu_artifact.outputs.dir }}
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
          overwrite: true

  CoverageSummary:
    name: Coverage Summary
    if: ${{ always() && needs.CoverageBuild.result == 'success' }}
    needs: [CoverageBuild, CoverageCpp, CoverageCppGpu, CoveragePythonTests, CoveragePythonSamples, CoveragePythonTools, CoveragePythonXgrammarOff, CoverageJS]
    outputs:
      upload_matrix_json: ${{ steps.coverage_files.outputs['upload-matrix-json'] || '[]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: 'false'

      - name: Install coverage Python dependencies
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: install-requirements

      - name: Download C++ artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: coverage-cpp-*
          path: ${{ github.workspace }}/artifacts/cpp

      - name: Download Python artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: coverage-python-*
          path: ${{ github.workspace }}/artifacts/python

      - name: Download Node.js artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: coverage-js-*
          path: ${{ github.workspace }}/artifacts/js

      - name: Generate final summary
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: render-summary
          selection: cpu,gpu
          selected-lanes: cpu,igpu-opencl

      - name: Merge duration reports
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: merge-durations
          duration-output: ${{ github.workspace }}/coverage-test-durations-all.csv

      - name: Upload merged duration artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-test-durations
          path: coverage-test-durations-all.csv
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
          overwrite: true

      - name: Resolve Codecov upload files
        id: coverage_files
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: resolve-uploads

  CoverageCodecovUploads:
    name: Coverage Codecov Upload (${{ matrix.upload.name }})
    if: ${{ always() && needs.CoverageSummary.result == 'success' && needs.CoverageSummary.outputs.upload_matrix_json != '[]' }}
    needs: CoverageSummary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        upload: ${{ fromJSON(needs.CoverageSummary.outputs.upload_matrix_json || '[]') }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: 'false'

      - name: Download coverage artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: ${{ matrix.upload.artifact_pattern }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.upload.artifact_group }}
          merge-multiple: false

      - name: Resolve Codecov upload files
        id: upload_files
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: resolve-upload-files
          artifact-group: ${{ matrix.upload.artifact_group }}
          artifact-names-json: ${{ toJSON(matrix.upload.artifact_names) }}
          upload-key: ${{ matrix.upload.key }}
          upload-file: ${{ matrix.upload.file }}

      - name: Upload Codecov (${{ matrix.upload.name }})
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.upload_files.outputs.files }}
          disable_search: true
          plugins: noop
          flags: ${{ matrix.upload.flag }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: true
          verbose: true
