name: Code coverage
on:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.event_name == 'pull_request' && github.run_id || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '21'
  OV_BRANCH: ${{ github.base_ref || github.ref }}
  CMAKE_CXX_COMPILER_LAUNCHER: sccache
  CMAKE_C_COMPILER_LAUNCHER: sccache
  SCCACHE_IGNORE_SERVER_IO_ERROR: 1
  SCCACHE_SERVER_PORT: 35555
  SCCACHE_CACHE_SIZE: 30G
  SCCACHE_AZURE_KEY_PREFIX: genai/coverage/ubuntu/22_04/x64
  PIP_CACHE_PATH: /mount/caches/pip/linux
  HF_HOME: /mount/caches/huggingface/lin
  HF_DATASETS_CACHE: /tmp/.hf_cache/datasets/
  OV_CACHE: /mount/caches/huggingface/.ov_cache/lin/
  NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt
  OPENVINO_LOG_LEVEL: 4
  BASE_PRODUCT_TYPE: public_linux_ubuntu_22_04_x86_64
  ENABLE_BRANCH_COVERAGE: 'false'
  LCOV_CAPTURE_TIMEOUT_SECONDS: '3600'
  GENAI_COVERAGE_INSTALL_ARTIFACT: coverage_genai_install
  GENAI_COVERAGE_NOTES_ARTIFACT: coverage_build_notes
  GENAI_COVERAGE_NODEJS_ARTIFACT: coverage_genai_nodejs_bindings
  GENAI_COVERAGE_XGRAMMAR_ARTIFACT: coverage_xgrammar_build
  GENAI_WHEELS_ARTIFACT_NAME: genai_wheels

jobs:
  openvino_download:
    name: Download OpenVINO
    outputs:
      ov_artifact_name: ${{ steps.openvino_download.outputs.ov_artifact_name }}
      ov_wheel_source: ${{ steps.openvino_download.outputs.ov_wheel_source }}
      docker_tag: ${{ steps.get_docker_tag.outputs.docker_tag }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    runs-on: aks-linux-medium
    container:
      image: 'openvinogithubactions.azurecr.io/openvino_provider:0.1.0'
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
    steps:
      - uses: openvinotoolkit/openvino/.github/actions/openvino_provider@master
        id: openvino_download
        with:
          platform: ubuntu22
          commit_packages_to_provide: wheels,developer_package.tar.gz,openvino_node_npm_package.tar.gz
          revision: latest_available_commit

      - name: Clone docker tag from OpenVINO repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: 'openvinotoolkit/openvino'
          path: 'openvino'
          ref: ${{ env.OV_BRANCH }}
          sparse-checkout: |
            .github/dockerfiles/docker_tag

      - name: Save docker tag to output
        id: get_docker_tag
        run: |
          docker_tag=$(cat openvino/.github/dockerfiles/docker_tag)
          echo "docker_tag=${docker_tag}" >> "${GITHUB_OUTPUT}"

  genai_build_wheels:
    name: Build Tokenizers & WWB Wheels
    needs: openvino_download
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    runs-on: aks-linux-4-cores-16gb
    container:
      image: openvinogithubactions.azurecr.io/ov_build/ubuntu_22_04_x64:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: -e SCCACHE_AZURE_BLOB_CONTAINER -e SCCACHE_AZURE_CONNECTION_STRING
    env:
      CMAKE_GENERATOR: Ninja
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      WHEELS_DIR: ${{ github.workspace }}/install/wheels
      SRC_DIR: ${{ github.workspace }}/src
    steps:
      - name: Checkout openvino.genai
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: ${{ env.SRC_DIR }}
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Build Tokenizers Wheel
        run: |
          python3 -m pip wheel -v --no-deps --wheel-dir ${{ env.WHEELS_DIR }} \
              --config-settings='override=wheel.build_tag="${{ github.run_number }}"' \
              --config-settings=override=cross.arch="manylinux_2_31_x86_64" \
              --config-settings=cmake.args="-DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache" \
              ${{ needs.openvino_download.outputs.ov_wheel_source }} \
              ${{ env.SRC_DIR }}/thirdparty/openvino_tokenizers
        working-directory: ${{ env.OV_INSTALL_DIR }}

      - name: Build WWB Wheel
        run: python3 -m pip wheel -v --no-deps --wheel-dir ${{ env.WHEELS_DIR }} ${{ env.SRC_DIR }}/tools/who_what_benchmark
        working-directory: ${{ env.OV_INSTALL_DIR }}

      - name: Upload Wheels
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.GENAI_WHEELS_ARTIFACT_NAME }}
          path: ${{ env.INSTALL_DIR }}
          if-no-files-found: 'error'

  genai_build_genai_wheel:
    name: Build GenAI Wheel - Python ${{ matrix.python-version }}
    needs: [openvino_download]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    defaults:
      run:
        shell: bash
    runs-on: aks-linux-8-cores-16gb
    container:
      image: openvinogithubactions.azurecr.io/ov_build/ubuntu_22_04_x64:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: -e SCCACHE_AZURE_BLOB_CONTAINER -e SCCACHE_AZURE_CONNECTION_STRING
    env:
      CMAKE_GENERATOR: Ninja
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      WHEELS_DIR: ${{ github.workspace }}/install/wheels
      SRC_DIR: ${{ github.workspace }}/src
      OpenVINODeveloperPackage_DIR: ${{ github.workspace }}/ov/developer_package/cmake
    steps:
      - name: Checkout openvino.genai
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: ${{ env.SRC_DIR }}
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Set CI environment
        id: create_manifest
        uses: openvinotoolkit/openvino/.github/actions/create_manifest@master
        with:
          repos: ${{ env.SRC_DIR }}
          product_type: ${{ env.BASE_PRODUCT_TYPE }}_Release
          target_arch: 'x86_64'
          build_type: Release
          save_to: ${{ github.workspace }}

      - name: Clean sccache stats
        run: ${SCCACHE_PATH} --zero-stats

      - name: Build GenAI Wheel
        run: |
          python_exec_path=$(python${{ matrix.python-version }} -c "import sys; print(sys.executable)")
          $python_exec_path -m pip wheel -v --no-deps --wheel-dir ${{ env.WHEELS_DIR }} \
              --config-settings=override=cross.arch="manylinux_2_31_x86_64" \
              --config-settings=cmake.args="-DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_COMPILER_LAUNCHER=sccache" \
              ${{ needs.openvino_download.outputs.ov_wheel_source }} \
              ${{ env.SRC_DIR }}
        working-directory: ${{ env.OV_INSTALL_DIR }}

      - name: Show sccache stats
        run: ${SCCACHE_PATH} --show-stats

      - name: Upload GenAI Wheel
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: genai_wheel_python_${{ matrix.python-version }}
          path: ${{ env.INSTALL_DIR }}
          if-no-files-found: 'error'

  CoverageBuild:
    name: Coverage Build Artifacts
    needs: [openvino_download]
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    runs-on: aks-linux-8-cores-32gb
    container:
      image: openvinogithubactions.azurecr.io/ov_build/ubuntu_22_04_x64:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: -e SCCACHE_AZURE_BLOB_CONTAINER -e SCCACHE_AZURE_CONNECTION_STRING
    env:
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      BUILD_DIR: ${{ github.workspace }}/build
      BUILD_JS_DIR: ${{ github.workspace }}/build_js
      XGRAMMAR_BUILD_DIR: ${{ github.workspace }}/build_xgrammar
      COVERAGE_NOTES_DIR: ${{ github.workspace }}/coverage_notes
      OpenVINODeveloperPackage_DIR: ${{ github.workspace }}/ov/developer_package/cmake
    steps:
      - name: Checkout openvino.genai
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Configure and build GenAI coverage package
        run: |
          apt update
          apt install -y libgtk2.0-dev pkg-config ffmpeg libavformat-dev libavcodec-dev libswscale-dev libavutil-dev opencl-clhpp-headers
          source "${OV_INSTALL_DIR}/setupvars.sh"
          cmake -DOpenVINODeveloperPackage_DIR="${OpenVINODeveloperPackage_DIR}" \
                -DENABLE_PYTHON=ON \
                -DENABLE_TESTS=ON \
                -DENABLE_COVERAGE=ON \
                -DENABLE_SYSTEM_OPENCL=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
                -DCMAKE_C_COMPILER_LAUNCHER=sccache \
                -S "${{ github.workspace }}" \
                -B "${BUILD_DIR}"
          cmake --build "${BUILD_DIR}" --config Release --parallel "$(nproc)" --verbose
          cmake --install "${BUILD_DIR}" --config Release --prefix "${INSTALL_DIR}"
          cmake --install "${BUILD_DIR}" --config Release --prefix "${INSTALL_DIR}" --component tests
          cmake --install "${BUILD_DIR}" --config Release --prefix "${INSTALL_DIR}" --component cpp_samples_genai

      - name: Build C++ samples
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          cp -a "${INSTALL_DIR}/." "${OV_INSTALL_DIR}/"
          chmod +x "${OV_INSTALL_DIR}/samples/cpp/build_samples.sh"
          "${OV_INSTALL_DIR}/samples/cpp/build_samples.sh" -i "${INSTALL_DIR}"
          chmod +x "${OV_INSTALL_DIR}/samples/c/build_samples.sh"
          "${OV_INSTALL_DIR}/samples/c/build_samples.sh" -i "${INSTALL_DIR}"

      - name: Build GenAI Node.js bindings
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          cmake -DOpenVINODeveloperPackage_DIR="${OpenVINODeveloperPackage_DIR}" \
                -DENABLE_JS=ON \
                -DENABLE_PYTHON=OFF \
                -DENABLE_WHEEL=OFF \
                -DENABLE_COVERAGE=ON \
                -DCPACK_GENERATOR=NPM \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
                -DCMAKE_C_COMPILER_LAUNCHER=sccache \
                -S "${{ github.workspace }}" \
                -B "${BUILD_JS_DIR}"
          cmake --build "${BUILD_JS_DIR}" --config Release --parallel "$(nproc)" --verbose
          cmake --install "${BUILD_JS_DIR}" --config Release --prefix "${{ github.workspace }}/src/js/bin"

      - name: Build Python API with ENABLE_XGRAMMAR=OFF
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          cmake -DOpenVINODeveloperPackage_DIR="${OpenVINODeveloperPackage_DIR}" \
                -DENABLE_PYTHON=ON \
                -DENABLE_XGRAMMAR=OFF \
                -DBUILD_TOKENIZERS=OFF \
                -DENABLE_COVERAGE=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
                -DCMAKE_C_COMPILER_LAUNCHER=sccache \
                -S "${{ github.workspace }}" \
                -B "${XGRAMMAR_BUILD_DIR}"
          cmake --build "${XGRAMMAR_BUILD_DIR}" --config Release --parallel "$(nproc)" --target py_openvino_genai --verbose

      - name: Collect coverage build notes
        run: |
          set -euo pipefail
          collect_gcno() {
            local source_dir="$1"
            local destination_dir="$2"
            mkdir -p "${destination_dir}"
            if [[ -d "${source_dir}" ]]; then
              (cd "${source_dir}" && find . -name '*.gcno' -exec cp --parents '{}' "${destination_dir}" \;)
            fi
          }
          collect_gcno "${BUILD_DIR}" "${COVERAGE_NOTES_DIR}/main-build"
          collect_gcno "${BUILD_JS_DIR}" "${COVERAGE_NOTES_DIR}/js-build"
          collect_gcno "${XGRAMMAR_BUILD_DIR}" "${COVERAGE_NOTES_DIR}/xgrammar-build"

      - name: Upload GenAI coverage install
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.GENAI_COVERAGE_INSTALL_ARTIFACT }}
          path: ${{ env.INSTALL_DIR }}
          if-no-files-found: 'error'

      - name: Upload Node.js bindings
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.GENAI_COVERAGE_NODEJS_ARTIFACT }}
          path: ${{ github.workspace }}/src/js/bin
          if-no-files-found: 'error'

      - name: Upload xgrammar-off build package
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.GENAI_COVERAGE_XGRAMMAR_ARTIFACT }}
          path: ${{ env.XGRAMMAR_BUILD_DIR }}/openvino_genai
          if-no-files-found: 'error'

      - name: Upload coverage build notes
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.GENAI_COVERAGE_NOTES_ARTIFACT }}
          path: ${{ env.COVERAGE_NOTES_DIR }}
          if-no-files-found: 'error'

  CoverageCpp:
    name: Coverage C++ (CPU)
    needs: [openvino_download, genai_build_wheels, CoverageBuild]
    timeout-minutes: 240
    runs-on: aks-linux-8-cores-32gb
    container:
      image: openvinogithubactions.azurecr.io/ov_test/ubuntu_22_04_x64:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: -e HF_TOKEN
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    env:
      TEST_PROFILE: cpu
      OV_WORKSPACE: ${{ github.workspace }}
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      INSTALL_PKG_DIR: ${{ github.workspace }}/install
      BIN_DIR: ${{ github.workspace }}/install/tests
      BUILD_DIR: ${{ github.workspace }}/build
      BUILD_JS_DIR: ${{ github.workspace }}/build_js
      COVERAGE_WRITE_STEP_SUMMARY: 'false'
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download GenAI coverage install
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_INSTALL_ARTIFACT }}
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download Python wheels
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_WHEELS_ARTIFACT_NAME }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download coverage build notes
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_NOTES_ARTIFACT }}
          path: ${{ github.workspace }}/coverage_notes
          merge-multiple: true

      - name: Restore coverage notes
        run: |
          rm -rf "${BUILD_DIR}" "${BUILD_JS_DIR}"
          mkdir -p "${BUILD_DIR}" "${BUILD_JS_DIR}"
          cp -a coverage_notes/main-build/. "${BUILD_DIR}/"
          if [[ -d coverage_notes/js-build ]]; then
            cp -a coverage_notes/js-build/. "${BUILD_JS_DIR}/"
          fi

      - name: Install coverage and test dependencies
        uses: ./.github/actions/install_wheel
        with:
          packages: "openvino;openvino_tokenizers[transformers]"
          requirements_files: "${{ github.workspace }}/tests/python_tests/requirements.txt"
          local_wheel_dir: ${{ env.OV_INSTALL_DIR }}/wheels

      - name: Install coverage Python dependencies
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: install-requirements

      - name: Convert models for cache types gtests
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          while IFS=',' read -r model_id _rest; do
            [[ -z "${model_id}" || "${model_id}" =~ ^[[:space:]]*# ]] && continue
            model_name="${model_id##*/}"
            model_dir="${HF_HOME}/ov_test_models/${model_name}"
            if [[ ! -f "${model_dir}/openvino_model.xml" ]]; then
              optimum-cli export openvino -m "${model_id}" --task text-generation-with-past "${model_dir}"
            fi
          done < "${BIN_DIR}/data/cache_types_models.csv"

      - name: Export OpenVINO runtime environment
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "OpenVINO_DIR=${OpenVINO_DIR:-}"
            echo "INTEL_OPENVINO_DIR=${INTEL_OPENVINO_DIR:-}"
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Run CPU C++ coverage tests
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: run-suite
          suite: cpp
          profile: cpu
          lane: cpu
          model-path: tests/cpp/data/cache_types_models.csv

      - name: Generate CPU native C/C++ coverage report
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-native
          profile: cpu

      - name: Collect C++ CPU results
        id: cpu_artifact
        if: ${{ always() }}
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: collect-results
          suite: cpp
          profile: cpu
          lane: cpu

      - name: Upload C++ CPU artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.cpu_artifact.outputs['artifact-name'] }}
          path: ${{ steps.cpu_artifact.outputs.dir }}
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
          overwrite: true

  CoverageCppGpu:
    name: Coverage C++ (iGPU, CDPruner OpenCL)
    needs: [openvino_download, CoverageBuild]
    timeout-minutes: 120
    runs-on: [self-hosted, igpu, Linux]
    container:
      image: openvinogithubactions.azurecr.io/ov_test/ubuntu_22_04_x64_igpu:${{ needs.openvino_download.outputs.docker_tag }}
      volumes:
        - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates:ro
        - /mount:/mount
        - ${{ github.workspace }}:${{ github.workspace }}
      options: "--group-add 44 --group-add 993 --device /dev/dri/renderD128:/dev/dri/renderD128"
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    env:
      TEST_PROFILE: gpu
      CXX_TEST_NAMES: cdpruner_dpp_opencl
      OV_WORKSPACE: ${{ github.workspace }}
      OV_INSTALL_DIR: ${{ github.workspace }}/ov
      INSTALL_DIR: ${{ github.workspace }}/install
      INSTALL_PKG_DIR: ${{ github.workspace }}/install
      BIN_DIR: ${{ github.workspace }}/install/tests
      BUILD_DIR: ${{ github.workspace }}/build
      BUILD_JS_DIR: ${{ github.workspace }}/build_js
      COVERAGE_WRITE_STEP_SUMMARY: 'false'
      PYTHONDONTWRITEBYTECODE: '1'
      GIT_SSL_CAINFO: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt
      REQUESTS_CA_BUNDLE: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt
      PIP_CERT: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt
    steps:
      - name: Checkout sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - name: Download OpenVINO package
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ needs.openvino_download.outputs.ov_artifact_name }}
          path: ${{ env.OV_INSTALL_DIR }}
          merge-multiple: true

      - name: Download GenAI coverage install
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_INSTALL_ARTIFACT }}
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download coverage build notes
        uses: akashchi/download-artifact@d59a9c15fec3fdb7c9adf09464124d00f9c11415
        with:
          name: ${{ env.GENAI_COVERAGE_NOTES_ARTIFACT }}
          path: ${{ github.workspace }}/coverage_notes
          merge-multiple: true

      - name: Verify GPU device availability
        run: clinfo

      - name: Restore coverage notes
        run: |
          rm -rf "${BUILD_DIR}" "${BUILD_JS_DIR}"
          mkdir -p "${BUILD_DIR}" "${BUILD_JS_DIR}"
          cp -a coverage_notes/main-build/. "${BUILD_DIR}/"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: openvinotoolkit/openvino/.github/actions/setup_python@master
        with:
          version: ${{ env.PYTHON_VERSION }}
          pip-cache-path: ${{ env.PIP_CACHE_PATH }}
          should-setup-pip-paths: 'true'
          self-hosted-runner: 'true'

      - name: Install coverage Python dependencies
        uses: openvinotoolkit/openvino/.github/actions/coverage_toolkit@master
        with:
          command: install-requirements

      - name: Export OpenVINO runtime environment
        run: |
          source "${OV_INSTALL_DIR}/setupvars.sh"
          {
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:-}"
            echo "OpenVINO_DIR=${OpenVINO_DIR:-}"
