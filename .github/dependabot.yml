# See help here: https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/enabling-and-disabling-version-updates

version: 2
updates:
  #
  # Github actions - CI
  #
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 3
    ignore:
      # Cannot be updated for the moment, ticket: 184715
      - dependency-name: "actions/checkout"
      # Due to recent trivy security issues to be updated manually
      - dependency-name: "aquasecurity/trivy-action"
    groups:
      github-actions:
        patterns:
          - "*"

  #
  # Enable version updates for npm
  #
  - package-ecosystem: "npm"
    directories:
      - "/site"
      - "/.github/actions/install_wheel"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    groups:
      npm-dependencies:
        patterns:
          - "*"

  #
  # Enable version updates for npm
  #
  - package-ecosystem: "npm"
    directories:
      - "/src/js"
      - "/samples/js"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Dublin"
    open-pull-requests-limit: 3
    versioning-strategy: lockfile-only
    groups:
      npm-dependencies:
        patterns:
          - "*"

  #
  # Python dependencies
  #
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "./samples/"
      - "./tests/python_tests/"
      - "./tools/llm_bench/"
      - "./tools/who_what_benchmark/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Dublin"
    versioning-strategy: increase-if-necessary
    ignore:
      # PyTorch ecosystem packages use local version labels (+cpu, +cu118, etc.)
      # which are incompatible with range specifiers (<=, >=) in PEP 440.
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "torchaudio"
      - dependency-name: "torchcodec"
      # cmake has two declarations with different environment markers per platform.
      # Dependabot cannot handle multiple declarations of the same package name.
      - dependency-name: "cmake"
      # sentence-transformers, starting with version 5.4, requires torchcodec, torchcodec expects to have ffmpeg on machine
      # have fixed version 5.3 for sentence-transformers to clarify all the details and setting consistent versions in tests and tools
      - dependency-name: "sentence-transformers"
      # huggingface-hub is installed for who_what_benchmark only if "llm-test-openvino" extras option is specified
      # newest version of huggingface-hub cause conflict with transformers 4.57.6, which is also defined for this extras
      - dependency-name: "huggingface-hub"
    groups:
      pip-dependencies:
        patterns:
          - "*"
