en:
  prompts:
    - "Hello and welcome to the OpenVINO speech generation benchmark. This tool helps measure voice quality across different model versions."
    - "The weather today is sunny with a light breeze coming in from the coast. It should be a perfect afternoon for a walk in the park."
    - "Please remember to save your work before restarting the application. Unsaved changes will be lost if the process is interrupted."
    - "OpenVINO GenAI supports efficient inference on both CPU and GPU devices. It is designed to minimize latency while maintaining high throughput."
    - "Neural text to speech systems can produce remarkably natural sounding voices. Recent advances have made it difficult to distinguish them from human speech."
    - "This sample passage helps evaluate pronunciation, rhythm, and prosody quality. A good text to speech system should handle all three consistently."
    - "The project build completed successfully without any warnings or errors. All unit tests passed and the artifact is ready for deployment."
    - "Benchmarking helps us compare model quality across different versions and configurations. It gives engineers a repeatable way to detect regressions."
    - "Reading aloud at a steady pace improves clarity and speaking confidence. Pausing between sentences gives the listener time to absorb the information."
    - "A well designed evaluation set should contain prompts of varying length and complexity. This ensures that the model is tested across a wide range of conditions."
    - "The package was delivered earlier than expected this afternoon, which was a pleasant surprise. Please confirm receipt and verify the contents are undamaged."
    - "Could you explain how to configure the model for low latency inference? We need to keep the response time under two hundred milliseconds per request."
    - "We observed stable throughput during the entire validation run on the test cluster. Peak memory usage remained within acceptable limits throughout the session."
    - "The train to the city center departs every fifteen minutes from platform three. Make sure to validate your ticket before boarding to avoid a fine."
    - "Thank you for your patience while we complete the system update. Service will be fully restored within approximately ten minutes."
    - "Machine learning pipelines require careful testing, monitoring, and version control. Even small preprocessing changes can significantly affect downstream model quality."
    - "Our team reviewed the pull request, left detailed comments, and approved the changes. The feature branch will be merged into main after the CI pipeline passes."
    - "He quickly packed his bag, grabbed his travel documents, and headed to the airport terminal. The flight was scheduled to depart in just under two hours."
    - "The latest release includes several improvements to speech synthesis naturalness and speed. Users should upgrade to benefit from the reduced latency and higher audio fidelity."
    - "A tiny delay in audio playback can significantly affect the perceived quality of a voice assistant. Buffering and synchronization must be carefully managed in real time systems."
    - "Turn right at the traffic light, continue past the bridge, and take the second exit on the roundabout. The destination will be on your left just after the petrol station."
    - "The notebook contains working examples for speech, vision, and language models. Each example includes setup instructions and expected output for easy verification."
    - "System diagnostics completed successfully and all components are fully operational. No anomalies were detected in the hardware or software health checks."
    - "Let us compare the baseline and optimized models side by side using the same set of prompts. This gives a fair picture of quality gains and any potential regressions."
    - "The conference keynote begins right after the lunch break in the main hall. Attendees are encouraged to take their seats at least five minutes before the scheduled start time."
    - "Accurate transcription depends on both acoustic model quality and language model context. Errors in one component tend to compound the errors produced by the other."
    - "She rehearsed the presentation three times before delivering it to the board. Her clear pacing and confident tone made a strong impression on the entire audience."
    - "Please speak naturally and avoid rushing through technically complex terminology. The synthesized output should match the intended phrasing and intonation of the input text."
    - "The river flooded the lower part of the valley following several days of continuous rainfall. Residents in the affected areas were advised to move to higher ground as a precaution."
    - "Optimizing inference for edge devices requires careful balancing of accuracy and computational cost. Quantization and pruning are two effective techniques for reducing model size and latency."
    - "After the meeting concluded, the team gathered in the common area for an informal discussion. Several useful ideas emerged from that conversation and were later added to the backlog."
    - "The archive contains recordings from all forty interview sessions held over the past two months. Each file is labeled with the date, participant identifier, and session duration."
    - "Effective documentation helps new contributors understand the codebase much more quickly. Clear examples and consistent formatting reduce the time needed to answer recurring questions."
    - "The satellite imagery revealed significant changes in land cover over the past decade. Researchers used automated classification tools to quantify the extent of deforestation in the region."
    - "A calm and steady speaking voice conveys confidence and helps the listener stay engaged. Variations in pitch and pace add expressiveness without sacrificing intelligibility."