en:
  prompts:
    - "Hello and welcome to the OpenVINO speech generation benchmark. This tool helps measure voice quality across different model versions."
    - "The weather today is sunny with a light breeze coming in from the coast. It should be a perfect afternoon for a walk in the park."
    - "Please remember to save your work before restarting the application. Unsaved changes will be lost if the process is interrupted."
    - "OpenVINO GenAI supports efficient inference on both CPU and GPU devices. It is designed to minimize latency while maintaining high throughput."
    - "Have you ever wondered what truly makes a voice sound natural and authentic rather than robotic and artificial?"
    - "When designing speech synthesis systems, engineers must carefully balance countless variables including acoustic fidelity, computational efficiency, emotional expressiveness, and linguistic accuracy. Each parameter interaction creates subtle cascading effects that ultimately determine whether listeners perceive the output as mechanistic and artificial or as genuinely natural and emotionally resonant."
    - "Hey, don't forget to check out the latest software update! It's got some really cool new features and everything runs super fast now."
    - "In the silence between spoken words lies the profound power of understanding and connection. A voice that whispers becomes pure art."
    - "Sometimes the best memories are the ones we cannot hear again, locked away in the past like forgotten melodies and distant dreams."
    - "To optimize your inference pipeline for real-time performance, you should compress the model using quantization techniques, implement efficient caching strategies, and monitor memory allocation patterns continuously throughout execution."
    - "She stood at the window watching the rain pour down, remembering all the conversations they'd had and wishing she could hear his voice one more time through the speaker."
    - "Could the future of human-computer interaction be shaped entirely by how naturally and expressively an artificial system can communicate with you across different contexts and situations?"
    - "Imagine a world where every piece of written content could be instantly transformed into perfectly natural-sounding speech accessible to anyone, anywhere, anytime. Language barriers could dissolve, learning could become more interactive, and stories could reach audiences who prefer listening to reading."
    - "Why did the speech synthesis model go to therapy? Because it absolutely had trouble expressing itself naturally and clearly!"
    - "Every voice has value and profound meaning. Your words matter far more than you might realize, and they deserve to be heard clearly and beautifully."
    - "Evaluating model performance requires quantifying multiple critical dimensions including phoneme accuracy, prosodic naturalness, and real-time processing efficiency metrics."
    - "During the final rehearsal before the public launch, the team discovered that subtle timing changes in punctuation, phrase boundaries, and emphasis could dramatically alter how listeners judged clarity and naturalness, even when the underlying words remained the same and the measured latency stayed comfortably within target limits."
    - "The marketplace buzzed with vibrant energy and color everywhere. Merchants called out their goods enthusiastically while the enticing smell of spiced bread and fresh flowers filled the air around every corner and street corner."